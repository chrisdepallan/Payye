# Optional local services for Postgres + MinIO development.
# The backend works without these (SQLite + local file storage by default).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payye
      POSTGRES_PASSWORD: payye
      POSTGRES_DB: payye
    ports:
      - "5432:5432"
    volumes:
      - payye_pg:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - payye_minio:/data

volumes:
  payye_pg:
  payye_minio:
